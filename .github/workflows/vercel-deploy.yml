# Deploy static site + /api/bridge/* serverless routes (see Vercel Deployments & CI/CD guidance).
# GitHub → Settings → Secrets and variables → Actions:
#   VERCEL_TOKEN       — https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — team_… from Vercel → Team Settings, or from `vercel link` → .vercel/project.json orgId
#   VERCEL_PROJECT_ID  — prj_… from Project → Settings → General
name: Vercel Deploy

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Vercel secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets at Settings → Secrets and variables → Actions"
            echo "  VERCEL_TOKEN       — https://vercel.com/account/tokens"
            echo "  VERCEL_ORG_ID      — team_… from .vercel/project.json or Team Settings"
            echo "  VERCEL_PROJECT_ID  — prj_… from .vercel/project.json or Project Settings"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Test bridge API
        run: npm test

      - name: Install Vercel CLI
        run: npm install -g vercel@50.39.0

      - name: Pull Vercel environment
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel pull --yes --environment=preview
          else
            vercel pull --yes --environment=production
          fi

      - name: Build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel build
          else
            vercel build --prod
          fi

      - name: Deploy prebuilt
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel deploy --prebuilt
          else
            vercel deploy --prebuilt --prod
          fi
